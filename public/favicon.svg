<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
    
    <!-- GSAP / Primary color glow for the border -->
    <linearGradient id="borderGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <!-- Drop shadow for the text -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Base Rectangle -->
  <rect x="4" y="4" width="92" height="92" rx="24" fill="url(#bg)" stroke="url(#borderGlow)" stroke-width="4"/>

  <!-- Inner highlight for glass effect -->
  <rect x="6" y="6" width="88" height="88" rx="22" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.1"/>

  <!-- The "B." Logo Text -->
  <text 
    x="50" 
    y="66" 
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
    font-weight="900" 
    font-size="56" 
    fill="#ffffff" 
    text-anchor="middle"
    letter-spacing="-2"
    filter="url(#shadow)"
  >B.</text>
</svg>
